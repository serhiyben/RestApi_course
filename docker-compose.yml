services:
  # Налаштування бази даних PostgreSQL
  db:
    image: postgres:15
    container_name: library_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Налаштування FastAPI додатка
  app:
    build: .
    container_name: library_app
    # МАГІЯ ТУТ: синхронізуємо папку на Windows з папкою в контейнері
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/library
    depends_on:
      - db

volumes:
  postgres_data:
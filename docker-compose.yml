version: '3.8'

services:
  
  db:
    image: mongo:latest
    container_name: library_mongo
    restart: always
    environment:
      
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  
  app:
    build: .
    container_name: library_app
    
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      
      
      MONGO_URL: mongodb://mongo_admin:password@db:27017
    depends_on:
      - db

volumes:
  mongo_data:
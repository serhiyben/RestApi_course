version: '3.8'

services:
  
  db:
    image: mongo:latest
    container_name: library_mongo
    restart: always
    environment:
      
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  
  app:
    build: .
    container_name: library_app
    
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      
      
      MONGO_URL: mongodb://mongo_admin:password@db:27017
    depends_on:
      - db

  redis:
    image: redis:latest
    container_name: library_redis
    ports:
      - "6379:6379"

  prism:
    image: stoplight/prism:latest
    container_name: library_mock_api
    ports:
      - "4010:4010"
    volumes:
      - ./openapi.yaml:/tmp/openapi.yaml
    command: mock -m false  -h 0.0.0.0 /tmp/openapi.yaml

  locust:
    build:
      context: .
      dockerfile: Dockerfile.locust
    container_name: library_locust
    ports:
      - "8089:8089"
    environment:
      - LOCUST_HOST=http://app:8000
    depends_on:
      - app

volumes:
  mongo_data: